<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Events - EventHub</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-header {
      background: var(--gradient-hero);
      color: white;
      padding: 120px 0 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.3;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .page-header p {
      font-size: 1.1rem;
      opacity: 0.9;
      position: relative;
      z-index: 1;
    }

    .events-grid-section {
      padding: 60px 0 100px;
    }

    .events-grid-section h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2rem;
      color: var(--text-primary);
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
    }

    .event-card {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all var(--transition-normal);
      animation: scaleIn 0.5s ease forwards;
      opacity: 0;
      cursor: pointer;
      position: relative;
    }

    .event-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--gradient-primary);
      transform: scaleX(0);
      transition: transform var(--transition-normal);
    }

    .event-card:hover {
      transform: translateY(-10px);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
    }

    .event-card:hover::before {
      transform: scaleX(1);
    }

    .event-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .event-card:hover .event-image {
      transform: scale(1.05);
    }

    .event-image-container {
      overflow: hidden;
      position: relative;
    }

    .event-image-container::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(to top, var(--card-bg), transparent);
      pointer-events: none;
    }

    .event-card-body {
      padding: 20px;
    }

    .event-card h3 {
      font-size: 1.25rem;
      margin-bottom: 10px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .event-card .event-meta {
      display: flex;
      gap: 16px;
      font-size: 0.9rem;
      opacity: 0.9;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .event-card .event-description {
      color: var(--text-secondary);
      margin-bottom: 15px;
      font-size: 0.95rem;
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .event-card .event-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
    }

    .event-card .participants {
      font-size: 0.9rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .event-card .participants::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--success-color);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .event-card .btn {
      font-size: 0.9rem;
      padding: 8px 16px;
    }

    .filter-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar select,
    .filter-bar input {
      padding: 10px 15px;
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      font-size: 0.95rem;
      background: var(--bg-color);
      transition: all var(--transition-fast);
    }

    .filter-bar select:focus,
    .filter-bar input:focus {
      outline: none;
      border-color: var(--primary-color);
      background: var(--card-bg);
    }

    .filter-bar label {
      font-weight: 600;
      color: var(--text-secondary);
    }

    .no-events-found {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .no-events-found svg {
      margin-bottom: 20px;
      opacity: 0.5;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @media (max-width: 768px) {
      .events-grid {
        grid-template-columns: 1fr;
      }

      .filter-bar {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">EventHub</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html" class="active">Events</a></li>
        <li><a href="login.html" id="loginLink">Login</a></li>
        <li><a href="signup.html" id="signupLink">Sign Up</a></li>
        <li><a href="user-dashboard.html" id="dashboardLink" style="display: none;">Dashboard</a></li>
        <li><a href="profile.html" id="profileLink" style="display: none;">Profile</a></li>
      </ul>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <div class="user-info" id="userInfo" style="display: none;">
          <span id="userName"></span>
          <a href="#" id="logoutBtn">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>All Events</h1>
      <p>Discover and register for upcoming events</p>
    </div>
  </header>

  <section class="events-grid-section">
    <div class="container">
      <div class="filter-bar">
        <label for="searchInput">Search:</label>
        <input type="text" id="searchInput" placeholder="Search events...">
        <label for="sortSelect">Sort by:</label>
        <select id="sortSelect">
          <option value="date-asc">Date (Soonest)</option>
          <option value="date-desc">Date (Latest)</option>
          <option value="name-asc">Name (A-Z)</option>
          <option value="name-desc">Name (Z-A)</option>
        </select>
      </div>

      <div class="events-grid" id="eventsGrid">
        <div class="loading">Loading events...</div>
      </div>
    </div>
  </section>

  <div id="authModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Login Required</h2>
      <p>You need to be logged in to register for events.</p>
      <div class="modal-buttons">
        <a href="login.html" class="btn btn-primary">Login</a>
        <a href="signup.html" class="btn btn-secondary">Sign Up</a>
      </div>
    </div>
  </div>

  <div id="eventModal" class="modal">
    <div class="modal-content event-detail-modal">
      <span class="close-modal">&times;</span>
      <div id="eventModalContent"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 EventHub. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();

    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      const userInfo = document.getElementById('userInfo');
      const loginLink = document.getElementById('loginLink');
      const signupLink = document.getElementById('signupLink');
      const dashboardLink = document.getElementById('dashboardLink');
      const profileLink = document.getElementById('profileLink');

      if (token && user) {
        if (userInfo) {
          userInfo.style.display = 'flex';
          document.getElementById('userName').textContent = user.name || 'User';
        }
        if (loginLink) loginLink.style.display = 'none';
        if (signupLink) signupLink.style.display = 'none';
        if (dashboardLink) dashboardLink.style.display = 'block';
        if (profileLink) profileLink.style.display = 'block';

        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
          e.preventDefault();
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          window.location.reload();
        });
      }

      const themeToggle = document.getElementById('themeToggle');
      const sunIcon = themeToggle?.querySelector('.sun-icon');
      const moonIcon = themeToggle?.querySelector('.moon-icon');

      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark' && sunIcon && moonIcon) {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      }

      themeToggle?.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        if (sunIcon && moonIcon) {
          sunIcon.style.display = newTheme === 'dark' ? 'none' : 'block';
          moonIcon.style.display = newTheme === 'dark' ? 'block' : 'none';
        }
      });

      loadEvents();
      setupFilters();
      setupModals();
    });

    let allEvents = [];

    async function loadEvents() {
      const grid = document.getElementById('eventsGrid');
      grid.innerHTML = '<div class="loading">Loading events...</div>';

      try {
        allEvents = await EventsAPI.getAll();
        displayEvents(allEvents);

        document.querySelectorAll('.close-modal').forEach(btn => {
          btn.addEventListener('click', () => {
            btn.closest('.modal').style.display = 'none';
          });
        });

        window.addEventListener('click', (e) => {
          if (e.target.classList.contains('modal')) {
            e.target.style.display = 'none';
          }
        });
      } catch (error) {
        console.error('Failed to load events:', error);
        grid.innerHTML = `
          <div class="error-message" style="grid-column: 1/-1; text-align: center; padding: 40px;">
            Failed to load events. Please try again later.<br>
            <button class="btn btn-primary" onclick="loadEvents()" style="margin-top: 15px;">Retry</button>
          </div>
        `;
      }
    }

    function displayEvents(events) {
      const grid = document.getElementById('eventsGrid');

      if (!events || events.length === 0) {
        grid.innerHTML = `
          <div class="no-events-found" style="grid-column: 1/-1;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <p>No events found.</p>
          </div>
        `;
        return;
      }

      const defaultImages = [
        'https://images.unsplash.com/photo-1518779578993-ec3589fee39f?w=400&h=200&fit=crop',
        'https://images.unsplash.com/photo-1517697472173-43c9d7c9a45c?w=400&h=200&fit=crop',
        'https://images.unsplash.com/photo-1526378722481-4a1a1323ba1a45?w=400&h=200&fit=crop',
        'https://images.unsplash.com/photo-1515879216487-1a1323ba1a45?w=400&h=200&fit=crop',
        'https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=400&h=200&fit=crop'
      ];

      grid.innerHTML = events.map((event, index) => {
        const imageIndex = event.id % defaultImages.length;
        const imageUrl = event.image_url || defaultImages[imageIndex];

        return `
          <div class="event-card" style="animation-delay: ${index * 0.1}s" data-event-id="${event.id}" onclick="openEventDetail(${event.id})">
            <div class="event-image-container">
              <img src="${imageUrl}" alt="${escapeHtml(event.title)}" class="event-image" 
                   onerror="this.src='${defaultImages[imageIndex]}'">
            </div>
            <div class="event-card-body">
              <h3>${escapeHtml(event.title)}</h3>
              <div class="event-meta">
                <span>${formatDate(event.date)}</span>
                <span>${escapeHtml(event.location || 'TBD')}</span>
              </div>
              <p class="event-description">${escapeHtml(event.description || 'No description available')}</p>
              <div class="event-footer">
                <span class="participants">${event.participants_count || 0} participants</span>
                <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); handleRegisterClick(${event.id})">
                  Register
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      animateEventCards();
    }

    function animateEventCards() {
      const cards = document.querySelectorAll('.event-card');
      cards.forEach((card, index) => {
        setTimeout(() => {
          card.style.opacity = '1';
          card.style.transform = 'scale(1)';
        }, index * 100);
      });
    }

    function setupFilters() {
      const searchInput = document.getElementById('searchInput');
      const sortSelect = document.getElementById('sortSelect');

      searchInput?.addEventListener('input', applyFilters);
      sortSelect?.addEventListener('change', applyFilters);
    }

    function applyFilters() {
      const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
      const sortBy = document.getElementById('sortSelect')?.value || 'date-asc';

      let filtered = allEvents.filter(event =>
        event.title.toLowerCase().includes(searchTerm) ||
        event.description?.toLowerCase().includes(searchTerm) ||
        event.location?.toLowerCase().includes(searchTerm)
      );

      switch(sortBy) {
        case 'date-asc':
          filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
          break;
        case 'date-desc':
          filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
          break;
        case 'name-asc':
          filtered.sort((a, b) => a.title.localeCompare(b.title));
          break;
        case 'name-desc':
          filtered.sort((a, b) => b.title.localeCompare(a.title));
          break;
      }

      displayEvents(filtered);
    }

    function setupModals() {
      document.querySelectorAll('.close-modal').forEach(btn => {
        btn.addEventListener('click', () => {
          btn.closest('.modal').style.display = 'none';
        });
      });

      window.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) {
          e.target.style.display = 'none';
        }
      });
    }

    function handleRegisterClick(eventId) {
      const token = localStorage.getItem('token');

      if (!token) {
        document.getElementById('authModal').style.display = 'flex';
        return;
      }

      registerForEvent(eventId);
    }

    async function registerForEvent(eventId) {
      try {
        const result = await RegistrationsAPI.register(eventId);
        showAlert('Success', result.message, 'success');
      } catch (error) {
        if (error.message.includes('Already registered')) {
          showAlert('Already Registered', error.message, 'warning');
        } else {
          showAlert('Error', error.message, 'error');
        }
      }
    }

    function showAlert(title, message, type) {
      const modal = document.getElementById('eventModal');
      const content = document.getElementById('eventModalContent');

      const icons = {
        success: '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
        error: '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        warning: '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
      };

      const colors = {
        success: '#10b981',
        error: '#ef4444',
        warning: '#f59e0b'
      };

      content.innerHTML = `
        <div style="text-align: center;">
          ${icons[type]}
          <h2 style="color: ${colors[type]}; margin: 20px 0 10px;">${title}</h2>
          <p style="color: var(--text-secondary); margin-bottom: 20px;">${message}</p>
          <button class="btn btn-primary" onclick="closeModal('eventModal')" style="min-width: 120px;">Got it</button>
        </div>
      `;

      modal.style.display = 'flex';
    }

    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    function openEventDetail(eventId) {
      window.location.href = `event-detail.html?id=${eventId}`;
    }

    function formatDate(dateString) {
      const options = { year: 'numeric', month: 'short', day: 'numeric' };
      return new Date(dateString).toLocaleDateString('en-US', options);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
