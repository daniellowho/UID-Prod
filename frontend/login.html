<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EventHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">EventHub</div>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="signup.html">Sign Up</a></li>
        <li><a href="user-dashboard.html" id="dashboardLink" style="display: none;">Dashboard</a></li>
        <li><a href="profile.html" id="profileLink" style="display: none;">Profile</a></li>
      </ul>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <div class="user-info" id="userInfo" style="display: none;">
          <div class="nav-user-avatar" id="userAvatar" title="">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <a href="#" id="logoutBtn">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-box">
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <div class="form-group">
          <label id="loginError" class="error-message" style="display: none;"></label>
          <label id="passwordError" class="error-message" style="display: none;">Invalid email or password</label>
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <span>Sign In</span>
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </p>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 EventHub. All rights reserved. &nbsp;|&nbsp; <a href="index.html" style="color:rgba(245,245,247,.5);text-decoration:none;">Home</a> &nbsp;|&nbsp; <a href="signup.html" style="color:rgba(245,245,247,.5);text-decoration:none;">Sign Up</a></p>
      </div>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <script src="js/chatbot.js"></script>
</body>
</html>
