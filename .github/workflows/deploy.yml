name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# GitHub Pages needs these permissions
permissions:
  contents: read
  pages: write
  id-token: write
  packages: write   # needed to push to ghcr.io

# Only one concurrent deployment at a time
concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # ── 1. Deploy the static frontend to GitHub Pages ──────────────────────────
  deploy-frontend:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set backend API URL
        # Replace the localhost placeholder with your production backend URL.
        # Set BACKEND_URL as a repository variable (Settings → Variables → Actions)
        # e.g. https://your-backend.example.com/api
        # If not set, the frontend keeps pointing to localhost (useful for testing).
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          if [ -n "$BACKEND_URL" ]; then
            sed -i "s|http://localhost:3000/api|$BACKEND_URL|g" frontend/js/config.js
            echo "API URL set to: $BACKEND_URL"
          else
            echo "BACKEND_URL variable not set – keeping localhost default"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ── 2. Build & push the backend Docker image to GitHub Container Registry ──
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend:${{ github.sha }}
