name: Deploy to Railway

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

# Only one concurrent deployment at a time
concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        # Add your RAILWAY_TOKEN in Settings → Secrets and variables → Actions → Secrets
        # Get your token at: https://railway.app/account/tokens
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
